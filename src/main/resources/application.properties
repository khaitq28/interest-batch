# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:fintechdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console — open http://localhost:8080/h2-console to inspect data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable auto-run of batch job at startup (we trigger it manually after data init)
spring.batch.job.enabled=false

# Logging
logging.level.com.fintech=INFO
logging.level.org.springframework.batch=INFO
